server:
  port: 8083

spring:
  application:
    name: table-service
  datasource:
    url: jdbc:mysql://localhost:3306/${DB_NAME:pos_table}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:pistachio}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# MUST match auth-service's secret exactly.
jwt:
  secret: ${JWT_SECRET:thisIsADevOnlySecretKeyChangeItBeforeAnyRealDeploymentOk123456}

logging:
  level:
    org.springframework.security: INFO
