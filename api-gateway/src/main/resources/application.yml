server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      # --- GLOBAL CORS CONFIGURATION ---
      # This handles CORS for ALL your microservices at once!
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders: "*"
            allowCredentials: true

      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/auth/**

        - id: menu-service
          uri: ${MENU_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/menu-items/**

        - id: table-service
          uri: ${TABLE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/tables/**

        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/orders/**

        # --- ADDED PAYMENT SERVICE ---
        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/payments/**

logging:
  level:
    org.springframework.cloud.gateway: DEBUG